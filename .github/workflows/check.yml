name: check

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run bootstrap tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -p "test_*.py"
