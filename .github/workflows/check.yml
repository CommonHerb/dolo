name: check

on:
  push:
  pull_request:

jobs:
  bootstrap-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Read Herbert lock
        id: herbert-lock
        run: |
          set -euo pipefail
          source HERBERT.lock
          herbert_repository="${HERBERT_REPOSITORY#https://github.com/}"
          herbert_repository="${herbert_repository%.git}"
          echo "commit=$HERBERT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "repository=$herbert_repository" >> "$GITHUB_OUTPUT"
      - name: Check out pinned Herbert
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.herbert-lock.outputs.repository }}
          ref: ${{ steps.herbert-lock.outputs.commit }}
          path: herbert
      - name: Link herbert-pin for the compiler default seed path
        run: ln -sfn "$GITHUB_WORKSPACE/herbert" "$GITHUB_WORKSPACE/../herbert-pin"
      - name: Run bootstrap tests
        env:
          DOLO_HERBERT_SEED: ${{ github.workspace }}/herbert/bootstrap/seed/gen1.seed
        run: PYTHONPATH=src python3 -m unittest discover -s tests -p "test_*.py"

  sovereignty-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Read Herbert lock
        id: herbert-lock
        run: |
          set -euo pipefail
          source HERBERT.lock
          herbert_repository="${HERBERT_REPOSITORY#https://github.com/}"
          herbert_repository="${herbert_repository%.git}"
          echo "commit=$HERBERT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "repository=$herbert_repository" >> "$GITHUB_OUTPUT"
      - name: Check out pinned Herbert
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.herbert-lock.outputs.repository }}
          ref: ${{ steps.herbert-lock.outputs.commit }}
          path: herbert
      - name: Link herbert-pin for the compiler default seed path
        run: ln -sfn "$GITHUB_WORKSPACE/herbert" "$GITHUB_WORKSPACE/../herbert-pin"
      - name: Sovereignty meter + held-back wiring oracle
        # Fails if any ledger status=herbert authority does not pass its held-back wiring oracle
        # (CHECK-1 poison no-op + CHECK-2 load-bearing .herb owner + CHECK-3 content perturbation).
        # A green run means every claimed sovereignty gain is genuinely Herbert-wired, not a mirror.
        env:
          DOLO_HERBERT_SEED: ${{ github.workspace }}/herbert/bootstrap/seed/gen1.seed
        run: bash scripts/sovereignty_meter.sh

  herbert-execution:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Dolo
        uses: actions/checkout@v7

      - name: Set up Python substrate
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Read Herbert lock
        id: herbert-lock
        run: |
          set -euo pipefail
          source HERBERT.lock
          herbert_repository="${HERBERT_REPOSITORY#https://github.com/}"
          herbert_repository="${herbert_repository%.git}"
          echo "commit=$HERBERT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "repository=$herbert_repository" >> "$GITHUB_OUTPUT"

      - name: Check out pinned Herbert
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.herbert-lock.outputs.repository }}
          ref: ${{ steps.herbert-lock.outputs.commit }}
          path: herbert
      - name: Link herbert-pin for the compiler default seed path
        run: ln -sfn "$GITHUB_WORKSPACE/herbert" "$GITHUB_WORKSPACE/../herbert-pin"

      - name: Verify Herbert lock
        run: |
          set -euo pipefail
          source HERBERT.lock
          test "$(git -C herbert rev-parse HEAD)" = "$HERBERT_COMMIT"

      - name: Run Dolo through pinned Herbert
        env:
          DOLO_HERBERT_SEED: ${{ github.workspace }}/herbert/bootstrap/seed/gen1.seed
        run: scripts/verify_herbert_truth.sh --herbert-dir herbert
